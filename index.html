<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 Financial Stability Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 2rem;
      text-align: center;
      color: #2c3e50;
    }

    h2 {
      font-size: 18px;
      margin: 1.5rem 0 1rem 0;
      color: #2c3e50;
      border-bottom: 2px solid #3498db;
      padding-bottom: 8px;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .metric {
      background: #ecf0f1;
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }

    .metric-label {
      font-size: 12px;
      color: #7f8c8d;
      margin-bottom: 4px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .metric-value {
      font-size: 24px;
      font-weight: bold;
      color: #2c3e50;
    }

    .metric-value.positive { color: #27ae60; }
    .metric-value.negative { color: #e74c3c; }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px 12px;
      border: 1px solid #bdc3c7;
      border-radius: 6px;
      font-size: 14px;
      flex: 1;
      min-width: 150px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
    }

    button {
      padding: 10px 20px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }

    button:hover { background: #2980b9; }
    button.danger { background: #e74c3c; }
    button.danger:hover { background: #c0392b; }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #ecf0f1;
    }

    .item:last-child { border-bottom: none; }

    .item-name {
      flex: 1;
    }

    .item-amount {
      font-weight: bold;
      margin: 0 1rem;
    }

    .category-tag {
      font-size: 12px;
      background: #3498db;
      color: white;
      padding: 3px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }

    .priority-emergency { background: #e74c3c; }
    .priority-normal { background: #f39c12; }
    .priority-later { background: #95a5a6; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid #ecf0f1;
    }

    .task-item.completed {
      opacity: 0.6;
    }

    .task-item.completed .task-name {
      text-decoration: line-through;
    }

    .task-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .task-name {
      flex: 1;
    }

    .task-section {
      margin-top: 1rem;
    }

    .task-section h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      padding: 4px 0;
    }

    .priority-emergency h3 { color: #e74c3c; }
    .priority-normal h3 { color: #f39c12; }
    .priority-later h3 { color: #95a5a6; }

    .empty-state {
      text-align: center;
      color: #95a5a6;
      padding: 2rem 1rem;
      font-style: italic;
    }

    .chart-container {
      position: relative;
      height: 300px;
      margin: 1.5rem 0;
    }

    .footer {
      text-align: center;
      color: #95a5a6;
      font-size: 13px;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💰 Financial Stability Manager</h1>

    <!-- METRICS -->
    <div class="metrics-grid">
      <div class="metric">
        <div class="metric-label">Monthly Income</div>
        <div class="metric-value" id="incomeDisplay">₹0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Total Expenses</div>
        <div class="metric-value" id="expensesDisplay">₹0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Savings</div>
        <div class="metric-value" id="savingsDisplay">₹0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Savings %</div>
        <div class="metric-value" id="percentageDisplay">0%</div>
      </div>
    </div>

    <!-- INCOME SECTION -->
    <div class="card">
      <h2>📊 Set Your Monthly Income</h2>
      <div class="input-group">
        <input type="number" id="incomeInput" placeholder="Enter monthly income (₹)">
        <button onclick="setIncome()">Set Income</button>
      </div>
    </div>

    <!-- EXPENSE TRACKER -->
    <div class="card">
      <h2>💸 Track Your Expenses</h2>
      <div class="input-group">
        <input type="text" id="expenseName" placeholder="Expense name (e.g., Groceries)">
        <input type="number" id="expenseAmount" placeholder="Amount (₹)">
        <select id="expenseCategory">
          <option>Food</option>
          <option>Transport</option>
          <option>Utilities</option>
          <option>Entertainment</option>
          <option>Health</option>
          <option>Shopping</option>
          <option>Other</option>
        </select>
        <button onclick="addExpense()">Add Expense</button>
      </div>
      <div id="expensesList"></div>
    </div>

    <!-- CHARTS -->
    <div class="card">
      <h2>📈 Visual Analysis</h2>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
        <div class="chart-container">
          <canvas id="pieChart"></canvas>
        </div>
        <div class="chart-container">
          <canvas id="barChart"></canvas>
        </div>
      </div>
    </div>

    <!-- TASK MANAGER -->
    <div class="card">
      <h2>✅ Financial Goals & Tasks</h2>
      <div class="input-group">
        <input type="text" id="taskName" placeholder="Add a financial goal or task...">
        <select id="taskPriority">
          <option value="emergency">🚨 Emergency</option>
          <option value="normal">⚡ Not Emergency</option>
          <option value="later">📅 Can be done later</option>
        </select>
        <button onclick="addTask()">Add Task</button>
      </div>
      <div id="tasksList"></div>
    </div>

    <div class="footer">
      <p>Your data is saved automatically in your browser. Financial stability is built one step at a time! 🚀</p>
    </div>
  </div>

  <script>
    // ============ STATE ============
    let data = {
      monthlyIncome: 0,
      expenses: [],
      tasks: []
    };

    let pieChart = null;
    let barChart = null;

    // ============ LOAD & SAVE ============
    function loadData() {
      const saved = localStorage.getItem('financialData');
      if (saved) {
        data = JSON.parse(saved);
      }
      renderAll();
    }

    function saveData() {
      localStorage.setItem('financialData', JSON.stringify(data));
    }

    // ============ INCOME ============
    function setIncome() {
      const income = parseFloat(document.getElementById('incomeInput').value);
      if (!isNaN(income) && income > 0) {
        data.monthlyIncome = income;
        document.getElementById('incomeInput').value = '';
        saveData();
        renderAll();
      }
    }

    // ============ EXPENSES ============
    function addExpense() {
      const name = document.getElementById('expenseName').value;
      const amount = parseFloat(document.getElementById('expenseAmount').value);
      const category = document.getElementById('expenseCategory').value;

      if (name && !isNaN(amount) && amount > 0) {
        data.expenses.push({
          id: Date.now(),
          name,
          amount,
          category
        });
        document.getElementById('expenseName').value = '';
        document.getElementById('expenseAmount').value = '';
        saveData();
        renderAll();
      }
    }

    function removeExpense(id) {
      data.expenses = data.expenses.filter(e => e.id !== id);
      saveData();
      renderAll();
    }

    // ============ TASKS ============
    function addTask() {
      const name = document.getElementById('taskName').value;
      const priority = document.getElementById('taskPriority').value;

      if (name) {
        data.tasks.push({
          id: Date.now(),
          name,
          priority,
          completed: false
        });
        document.getElementById('taskName').value = '';
        saveData();
        renderAll();
      }
    }

    function toggleTask(id) {
      const task = data.tasks.find(t => t.id === id);
      if (task) {
        task.completed = !task.completed;
        saveData();
        renderAll();
      }
    }

    function removeTask(id) {
      data.tasks = data.tasks.filter(t => t.id !== id);
      saveData();
      renderAll();
    }

    // ============ CALCULATIONS ============
    function calculateTotals() {
      const totalExpenses = data.expenses.reduce((sum, e) => sum + e.amount, 0);
      const savings = data.monthlyIncome - totalExpenses;
      const percentage = data.monthlyIncome > 0 ? Math.round((savings / data.monthlyIncome) * 100) : 0;

      return { totalExpenses, savings, percentage };
    }

    // ============ RENDER METRICS ============
    function renderMetrics() {
      const { totalExpenses, savings, percentage } = calculateTotals();

      document.getElementById('incomeDisplay').textContent = `₹${data.monthlyIncome.toFixed(2)}`;
      document.getElementById('expensesDisplay').textContent = `₹${totalExpenses.toFixed(2)}`;
      
      const savingsEl = document.getElementById('savingsDisplay');
      savingsEl.textContent = `₹${savings.toFixed(2)}`;
      savingsEl.className = 'metric-value ' + (savings >= 0 ? 'positive' : 'negative');

      document.getElementById('percentageDisplay').textContent = percentage + '%';
    }

    // ============ RENDER EXPENSES ============
    function renderExpenses() {
      const list = document.getElementById('expensesList');
      if (data.expenses.length === 0) {
        list.innerHTML = '<div class="empty-state">No expenses yet. Start tracking!</div>';
        return;
      }

      list.innerHTML = data.expenses.map(e => `
        <div class="item">
          <div class="item-name">
            ${e.name}
            <span class="category-tag">${e.category}</span>
          </div>
          <div class="item-amount">₹${e.amount.toFixed(2)}</div>
          <button class="danger" onclick="removeExpense(${e.id})">Delete</button>
        </div>
      `).join('');
    }

    // ============ RENDER TASKS ============
    function renderTasks() {
      const list = document.getElementById('tasksList');
      const emergency = data.tasks.filter(t => t.priority === 'emergency');
      const normal = data.tasks.filter(t => t.priority === 'normal');
      const later = data.tasks.filter(t => t.priority === 'later');

      let html = '';

      if (emergency.length > 0) {
        html += '<div class="task-section priority-emergency"><h3>🚨 Emergency - Must do now</h3>';
        html += emergency.map(t => taskHTML(t)).join('');
        html += '</div>';
      }

      if (normal.length > 0) {
        html += '<div class="task-section priority-normal"><h3>⚡ Not Emergency - Should do soon</h3>';
        html += normal.map(t => taskHTML(t)).join('');
        html += '</div>';
      }

      if (later.length > 0) {
        html += '<div class="task-section priority-later"><h3>📅 Can be done later</h3>';
        html += later.map(t => taskHTML(t)).join('');
        html += '</div>';
      }

      if (data.tasks.length === 0) {
        html = '<div class="empty-state">No tasks yet. Add one to organize your goals!</div>';
      }

      list.innerHTML = html;
    }

    function taskHTML(task) {
      return `
        <div class="task-item ${task.completed ? 'completed' : ''}">
          <input type="checkbox" ${task.completed ? 'checked' : ''} 
                 onchange="toggleTask(${task.id})">
          <span class="task-name">${task.name}</span>
          <button class="danger" onclick="removeTask(${task.id})">Remove</button>
        </div>
      `;
    }

    // ============ RENDER CHARTS ============
    function renderCharts() {
      const { totalExpenses } = calculateTotals();

      // PIE CHART - Expenses by category
      const categoryData = {};
      data.expenses.forEach(e => {
        categoryData[e.category] = (categoryData[e.category] || 0) + e.amount;
      });

      const pieCtx = document.getElementById('pieChart').getContext('2d');
      if (pieChart) pieChart.destroy();

      if (Object.keys(categoryData).length > 0) {
        pieChart = new Chart(pieCtx, {
          type: 'doughnut',
          data: {
            labels: Object.keys(categoryData),
            datasets: [{
              data: Object.values(categoryData),
              backgroundColor: ['#3498db', '#e74c3c', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#34495e']
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'bottom' },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    return context.label + ': ₹' + context.parsed.toFixed(2);
                  }
                }
              }
            }
          }
        });
      }

      // BAR CHART - Income vs Expenses vs Savings
      const { savings } = calculateTotals();
      const barCtx = document.getElementById('barChart').getContext('2d');
      if (barChart) barChart.destroy();

      barChart = new Chart(barCtx, {
        type: 'bar',
        data: {
          labels: ['Income', 'Expenses', 'Savings'],
          datasets: [{
            label: 'Amount (₹)',
            data: [data.monthlyIncome, totalExpenses, savings],
            backgroundColor: ['#3498db', '#e74c3c', '#2ecc71']
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return '₹' + context.parsed.y.toFixed(2);
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
    }

    // ============ RENDER ALL ============
    function renderAll() {
      renderMetrics();
      renderExpenses();
      renderTasks();
      renderCharts();
    }

    // ============ INIT ============
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
